<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backlog Automation Prospects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="header-controls">
        <h1 class="logo-title">
            <img src="assets/campana_bold.png" alt="Icono Campana Backlog" class="title-icon">
            Backlog Automation <span>Prospects</span>
        </h1>
        
        <div class="toggle-container">
            <span class="toggle-label label-active" id="labelSemanas">Semanas</span>
            <label class="switch">
                <input type="checkbox" id="zoomToggle">
                <span class="slider"></span>
            </label>
            <span class="toggle-label label-inactive" id="labelMeses">Meses</span>
        </div>
    </div>

    <div class="roadmap-wrapper">
        <div class="timeline-container">
            
            <div class="timeline-header" id="timelineHeader"></div>
            
            <div class="today-line" id="todayLine"></div>

            <div class="projects-area" id="projectsArea"></div>

        </div>
    </div>

    <div id="projectTooltip" class="project-tooltip"></div>

    <script src="js/app.js"></script>
</body>
</html>
